                    <h2>What is Prompt Engineering?</h2>
                    <p>Prompt engineering is the art and science of crafting effective inputs (prompts) to guide Large Language Models (LLMs) like ChatGPT, Claude, Gemini, etc., towards generating desired, accurate, and useful outputs. It's about communicating your intent to the AI in the clearest and most effective way possible.</p>
                    <p>Think of an LLM as an incredibly knowledgeable and versatile assistant. However, like any assistant, it needs clear instructions to perform tasks well. The quality of the output you get from an LLM is directly proportional to the quality of the prompt you provide.</p>

                    <h3>Why Does it Matter for Knowledge Workers?</h3>
                    <p>For knowledge workers, mastering prompt engineering can lead to significant benefits:</p>
                    <ul>
                        <li><strong>Increased Efficiency:</strong> Get the information or content you need faster, reducing time spent on research, drafting, and revision.</li>
                        <li><strong>Improved Output Quality:</strong> Generate more accurate, relevant, and nuanced responses from AI tools.</li>
                        <li><strong>Enhanced Creativity:</strong> Use LLMs as brainstorming partners, idea generators, or to explore different perspectives.</li>
                        <li><strong>Task Automation:</strong> Automate repetitive tasks like summarizing documents, drafting emails, or generating code snippets.</li>
                        <li><strong>Unlocking AI Potential:</strong> Move beyond simple Q&A to leverage the full power of LLMs for complex tasks.</li>
                    </ul>

                    <h3>How This Primer is Structured</h3>
                    <p>This primer will guide you through the foundational concepts of prompt engineering, explore various techniques, provide practical examples, and highlight common pitfalls. Our goal is to equip you with the knowledge to write better prompts and get more value from AI language models in your daily work.</p>
                    <p>Navigate through the sections using the sidebar. Each section builds upon the previous ones, but feel free to jump to topics that interest you most.</p>
                `

                    <h2>Real-World Prompt Refinement</h2>
                    <p>The best way to understand effective prompt engineering is to see it in action. These case studies illustrate how an initial, simple prompt can be iteratively refined to produce significantly better results from an LLM. We'll explore common scenarios: drafting complex communications, synthesizing information, and generating creative content.</p>
                    <!-- Graphic: Flowchart showing generic prompt iteration cycle: Initial Prompt -> AI Output -> Analysis/Critique -> Refined Prompt -> Improved AI Output -->

                    <h3>Case Study 1: Email Drafting for a Complex Request</h3>
                    <h4>Scenario</h4>
                    <p>Sarah, a project manager, needs to request detailed feedback on a new project proposal ('Project Nova') from three stakeholders: Maria (Head of Engineering, focused on technical feasibility), David (Head of Sales, focused on market viability), and Lisa (Head of Finance, focused on budget and ROI). Each has different priorities, and Sarah needs specific, actionable feedback by next Friday.</p>

                    <h4>Initial Prompt & Output</h4>
                    <p><strong>Initial Prompt:</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"Draft an email to Maria, David, and Lisa asking for feedback on the Project Nova proposal."</code></pre>
                    <p><strong>Potential AI Output (Critique):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>Subject: Feedback on Project Nova Proposal

Hi Maria, David, and Lisa,

Please provide your feedback on the Project Nova proposal.

Thanks,
Sarah</code></pre>
                    <p><strong>Critique of Initial Output:</strong></p>
                    <ul>
                        <li><strong>Too Vague:</strong> Doesn't specify what kind of feedback is needed or mention their specific areas of expertise.</li>
                        <li><strong>Lacks Context:</strong> No mention of the proposal being attached or where to find it.</li>
                        <li><strong>No Urgency/Deadline:</strong> Doesn't state when the feedback is needed.</li>
                        <li><strong>Generic:</strong> The email is unlikely to elicit detailed, targeted responses.</li>
                    </ul>

                    <h4>Refined Prompt & Improved Output</h4>
                    <p><strong>Refined Prompt:</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"Act as a Project Manager drafting an email to three key stakeholders: Maria (Head of Engineering), David (Head of Sales), and Lisa (Head of Finance).
The goal is to request detailed feedback on the attached 'Project Nova Proposal v2.pdf'.

    *   David: Market viability, sales projections, competitive landscape.

3.  Request feedback in a structured format, perhaps as bullet points or comments in the document.
4.  Set a clear deadline: end of day next Friday, [Insert Specific Date].
5.  Maintain a professional and appreciative tone.

The proposal document is 'Project Nova Proposal v2.pdf' and I will attach it to the email."</code></pre>

                    <!-- Graphic: Flowchart showing prompt iteration for Case Study 1 -->

                    <h3>Case Study 2: Information Synthesis from Multiple Sources</h3>
                    <h4>Scenario</h4>
                    <p>Mark, a research analyst, needs to write a concise overview of the "Impact of AI on the Future of Work." He has three short articles from different sources and wants to synthesize their key findings, not just get separate summaries.</p>

                    <h4>Initial Prompt & Output</h4>
                    <p><strong>Initial Prompt (with hypothetical article snippets):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"Summarize these three articles:
Article 1: 'AI will automate many routine tasks, leading to job displacement in some sectors but also creating new roles in AI development and management.'
Article 2: 'The integration of AI tools is expected to significantly boost productivity, but requires substantial investment in upskilling the workforce.'
Article 3: 'Ethical considerations, such as data privacy and algorithmic bias, are critical challenges as AI becomes more prevalent in workplace decision-making.'"</code></pre>
                    <p><strong>Potential AI Output (Critique):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>Summary of Article 1: This article states that AI will automate routine tasks, causing job displacement but also creating new AI-related jobs.
Summary of Article 2: This article indicates that AI tools will boost productivity but require workforce upskilling.
Summary of Article 3: This article highlights ethical challenges like data privacy and bias in AI for workplace decisions.</code></pre>
                    <p><strong>Critique of Initial Output:</strong></p>
                    <ul>
                        <li><strong>Disjointed:</strong> Provides three separate summaries, not a synthesized overview.</li>
                        <li><strong>Lacks Cohesion:</strong> Doesn't identify common themes or overarching narratives.</li>
                        <li><strong>Not an Overview:</strong> Fails to combine the information into a single, consolidated piece.</li>
                    </ul>

                    <h4>Refined Prompt & Improved Output</h4>
                    <p><strong>Refined Prompt:</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"You are a research analyst. I have three article snippets on the 'Impact of AI on the Future of Work'. Your task is to synthesize these into a single, cohesive overview (around 150-200 words) suitable for a managerial audience that needs a quick understanding of the topic.
Identify key themes and, if present, any notable agreements or contradictions across the articles.

--- Article 1 ---
'AI will automate many routine tasks, leading to job displacement in some sectors but also creating new roles in AI development and management.'
--- Article 2 ---
'The integration of AI tools is expected to significantly boost productivity, but requires substantial investment in upskilling the workforce to adapt to new job demands.'
--- Article 3 ---
'Ethical considerations, such as data privacy and algorithmic bias, are critical challenges as AI becomes more prevalent in workplace decision-making, potentially impacting hiring and performance monitoring.'
--- End of Snippets ---

Provide a synthesized overview that covers the main points and their interconnections."</code></pre>
                    <p><strong>Potential AI Output (Improved):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>The impact of Artificial Intelligence on the future of work presents a dual narrative of opportunity and challenge. A key theme emerging from recent analyses is AI's transformative role in automating routine tasks. While this is anticipated to boost productivity significantly (Article 2), it also signals potential job displacement in certain sectors, counterbalanced by the creation of new specialized roles in AI development and management (Article 1).

However, harnessing these productivity gains necessitates substantial investment in upskilling the existing workforce to meet evolving job demands (Article 2). Furthermore, the increasing integration of AI in workplace decision-making, including areas like hiring and performance monitoring, brings critical ethical considerations to the forefront. Addressing challenges such as data privacy and algorithmic bias is paramount to ensure fair and responsible AI adoption (Article 3). Overall, while AI promises enhanced efficiency, its successful integration hinges on proactive workforce development and robust ethical frameworks.</code></pre>
                    <h4>Analysis of Improved Output</h4>

                        <li><strong>Audience-Appropriate:</strong> The language is suitable for a managerial overview.</li>
                        <li><strong>Clear Structure:</strong> The refined prompt guided the AI to create a more analytical and useful output by explicitly asking for synthesis and thematic connections. The use of delimiters also helped in clearly separating the source texts.</li>

                id: "llm-types-prompting",

                content: `
                    <h2>Adapting Prompts to LLM Strengths</h2>
                    <p>While the core principles of prompt engineering—clarity, context, specificity, iteration—apply broadly across almost all Large Language Models (LLMs), understanding the general optimization or inherent strengths of a particular LLM can sometimes help in tailoring your prompts for even better results. Many modern LLMs are designed to be highly general-purpose and multi-modal, but some may still exhibit particular strengths based on their training data or architectural nuances.</p>
                    <p>Think of this as speaking to different specialists: while you'd use clear language with all, you might emphasize different aspects of your request depending on whether you're talking to a creative writer, a research librarian, or a software developer.</p>
                    <!-- Graphic: Venn diagram or table showing overlapping and distinct prompting considerations for different LLM archetypes -->

                    <h3>Models Optimized for Creativity</h3>
                    <p>Some LLMs, or specific versions of models (including many image generation models or those fine-tuned for story writing), excel at tasks requiring imagination, originality, and evocative outputs.</p>
                    <p><strong>Prompting Considerations:</strong></p>
                    <ul>
                        <li>Focus more on evocative language, vivid descriptions, and desired artistic styles.</li>
                        <li>Specify emotional tone, mood, or atmosphere.</li>
                        <li>Use more open-ended requests that allow the model creative freedom within defined parameters.</li>
                        <li>For image generation, describe visual elements, composition, artistic influences, and desired aesthetics in detail.</li>
                    </ul>
                    <p><strong>Example (Text-based creative model):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"Generate a short story (around 300 words) about a sentient, ancient tree in a bustling futuristic city that observes and reflects on the fleeting lives of humans. The tone should be melancholic yet hopeful, in a poetic, descriptive style."</code></pre>
                    <p><strong>Example (Conceptual, for an image generation model):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"A surreal digital painting of a bioluminescent forest at twilight. Giant, glowing mushrooms illuminate a winding path. A lone, cloaked figure walks the path. Style: reminiscent of Studio Ghibli, with a touch of fantasy art. Color palette: deep blues, purples, and vibrant greens."</code></pre>

                    <h3>Models Optimized for Factual Recall & Summarization</h3>
                    <p>These LLMs are often very strong at processing large amounts of text, extracting key information, answering factual questions, and providing concise summaries. They are typically trained on vast datasets of text and code.</p>
                    <p><strong>Prompting Considerations:</strong></p>
                    <ul>
                        <li>Emphasize clarity, conciseness, and direct questions.</li>
                        <li>Be highly specific about the information needed.</li>
                        <li>Request information in particular formats (e.g., "list the key dates," "provide a timeline").</li>
                        <li>For summarization, specify the desired length, target audience, and focus of the summary.</li>
                        <li>If applicable and supported, you might ask the model to cite sources or provide references (though this depends heavily on the model's capabilities and how it was trained).</li>
                    </ul>
                    <p><strong>Example:</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"Summarize the main arguments presented in the United Nations' 'World Economic Situation and Prospects 2023' report, specifically focusing on the outlook for developing countries. The summary should be approximately 250 words and targeted at an audience with basic economic literacy."</code></pre>

                    <h3>Models Optimized for Code Generation</h3>
                    <p>LLMs trained extensively on source code (e.g., GitHub repositories) can be powerful tools for writing, explaining, and debugging code in various programming languages.</p>
                    <p><strong>Prompting Considerations:</strong></p>
                    <ul>
                        <li>Be extremely specific about the programming language (e.g., Python, JavaScript, C++).</li>
                        <li>Clearly define the desired functionality of the code.</li>
                        <li>Specify function names, variable names, parameters, and expected return values if important.</li>
                        <li>Mention any specific algorithms, data structures, or libraries to be used (or avoided).</li>
                        <li>Provide context, such as existing code snippets if asking for modifications or debugging help.</li>
                        <li>Request explanations of code if needed: "Explain this Python script line by line."</li>
                    </ul>
                    <p><strong>Example:</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>"Write a Python function called 'parse_csv_data' that takes a file path string for a CSV file as input.
The function should:
1. Open and read the CSV file using the 'csv' module.
2. Assume the first row is the header.
3. Return a list of dictionaries, where each dictionary represents a row, with keys from the header row.
4. Include error handling for cases where the file does not exist or is not a valid CSV.

                    <h3>1. Clarity & Specificity: The Golden Rule</h3>
                    <p>The most crucial aspect of a good prompt is being crystal clear and highly specific about what you want. Ambiguity is the enemy of good AI output. Think of it as giving a chef a recipe: the more detailed the recipe, the closer the dish will be to your expectations.</p>

                    <h3>1. Zero-Shot Prompting</h3>
                    <p>This is the simplest form of prompting, where you ask the LLM to perform a task without providing any prior examples of how to do it. The model's performance relies entirely on its pre-trained knowledge, which is effective when it has been trained on a vast amount of data relevant to the task.</p>

                    <h2>Level Up Your Prompting Skills</h2>
                    <p>Once you're comfortable with the basics, explore these more advanced techniques to elicit even better responses from LLMs.</p>

                    <h3>1. Chain-of-Thought (CoT) / Step-by-Step Thinking</h3>
                    <p>Chain-of-Thought prompting encourages the LLM to break down a complex problem into intermediate reasoning steps before arriving at a final answer. You essentially ask the AI to "think out loud" or "show its work." This not only helps the AI reach more accurate conclusions for complex tasks but also gives you visibility into its reasoning process.</p>
                    <p><strong>How it works:</strong> You can prompt this by adding phrases like "Let's think step by step," "Show your work," "Explain your reasoning step-by-step," or by providing few-shot examples where the reasoning process is explicitly shown.</p>
                    <p><strong>Benefits:</strong> Significantly improves performance on tasks requiring arithmetic, commonsense, or symbolic reasoning. It also makes the AI's reasoning process more transparent and easier to debug.</p>
                    <!-- Diagram: Simple problem -> LLM shows steps -> Answer -->
                    <p><strong>Example (Simple Math Problem):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>Q: Roger has 5 tennis balls. He buys 2 more cans of tennis balls. Each can has 3 tennis balls. How many tennis balls does he have now? Let's think step by step.

A: Roger started with 5 balls.
He bought 2 cans, and each can has 3 balls, so that's 2 * 3 = 6 new balls.
In total, Roger now has 5 + 6 = 11 tennis balls.
The final answer is 11.

Q: The cafeteria had 23 apples. If they used 20 to make lunch and bought 6 more, how many apples do they have? Explain your reasoning.
A: [AI should show its reasoning steps here]</code></pre>
                    <p><strong>Example (Logic Puzzle):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>Q: There are three friends: Alex, Ben, and Clara. One is a doctor, one is a lawyer, and one is an engineer. Alex is not the lawyer. Ben is the doctor. What is Clara's profession? Show your work.

A:
1. There are three people: Alex, Ben, Clara.
2. There are three professions: Doctor, Lawyer, Engineer.
3. We are given that Ben is the Doctor. So, Ben's profession is Doctor.
4. This means Alex and Clara must be the Lawyer and Engineer.
5. We are given that Alex is not the Lawyer.
6. Therefore, Alex must be the Engineer.
7. This leaves Clara. Since Ben is the Doctor and Alex is the Engineer, Clara must be the Lawyer.
So, Clara's profession is Lawyer.</code></pre>

                    <h3>2. Self-Consistency</h3>
                    <p>Self-Consistency is an advanced technique that builds upon Chain-of-Thought. Instead of just generating one reasoning path, you prompt the LLM multiple times to generate several different reasoning paths for the same problem. Then, you select the most common answer among these paths (a sort of "majority vote").</p>
                    <p><strong>How to apply:</strong> This often means running the same CoT prompt multiple times. If the LLM platform allows, you might slightly increase the "temperature" setting (which controls randomness) for these multiple runs to encourage diverse reasoning paths. The user then analyzes these outputs to find the most frequently occurring answer. </p>
                    <p><strong>Benefits:</strong> Improves the robustness and accuracy of answers for complex reasoning tasks, as it's less likely that multiple different reasoning paths will arrive at the same incorrect answer. It helps mitigate the risk of a single flawed reasoning chain.</p>

                    <p>Suppose you ask: <code>"Q: A grocery store had 150 cartons of eggs. On Monday, they sold 1/3 of the cartons. On Tuesday, they received a new shipment of 30 cartons. How many cartons do they have now? Let's think step by step."</code></p>
                    <p>You might run this prompt 3 times and get slightly different paths (especially if the problem was more complex):</p>
                    <pre><button class="copy-code-button">Copy</button><code>Path 1:
1. Started with 150 cartons.
2. Sold 1/3 of 150: 150 / 3 = 50 cartons.
3. Remaining after sale: 150 - 50 = 100 cartons.
4. Received new shipment: 30 cartons.
5. Total now: 100 + 30 = 130 cartons.
Answer: 130

Path 2 (Slight variation, maybe a small miscalculation if problem was harder):
1. Initial cartons: 150.
2. Cartons sold: 150 * (1/3) = 50.
3. Cartons left: 150 - 50 = 100.
4. New cartons: 30.
5. Current total: 100 + 30 = 130.
Answer: 130

Path 3 (Another variation in wording or intermediate step order):
1. Eggs at start: 150.
2. Sold on Monday: One third of 150 is 50.
3. After Monday sale: 100 eggs.
4. Tuesday shipment: 30 eggs.
5. Final count: 100 + 30 = 130 eggs.
Answer: 130</code></pre>

                    <h3>4. Retrieval Augmented Generation (RAG) - Conceptual Overview</h3>
                    <p>RAG is a more advanced system architecture where the LLM's knowledge is augmented with information retrieved from external, up-to-date, or proprietary data sources (like a specific database of documents, a section of the internet, or your company's internal knowledge base) at the time of prompting. This significantly reduces hallucinations (making things up) and grounds the LLM's answers in specific, verifiable information, rather than just its general training data.</p>

User Question: 'I need to know the system requirements for Product X.'"</code></pre>


                    <h3>5. Using Delimiters</h3>
                    <p>Delimiters are characters or strings used to clearly separate different parts of your prompt, such as instructions, context, examples, input data, and the question. This helps the LLM understand the structure of your prompt and which parts are distinct inputs or instructions, especially for complex requests.</p>
                    <p><strong>Benefits:</strong> Helps the LLM understand the structure of your prompt, especially for complex requests with multiple components. This reduces ambiguity and improves the model's ability to follow instructions accurately.</p>
                    <p><strong>Common Delimiters:</strong></p>
                    <ul>
                        <li>Triple quotes: <code>"""Text"""</code></li>
                        <li>Triple backticks: <code>\`\`\`Text\`\`\`</code></li>
                        <li>Triple dashes: <code>---</code></li>
                        <li>Angle brackets / XML-like tags: <code>&lt;context&gt;Text&lt;/context&gt;</code>, <code>&lt;instruction&gt;Do this&lt;/instruction&gt;</code></li>
                        <li>Section headers: <code>###Instruction###</code>, <code>###Context###</code>, <code>##Question##</code></li>
                    </ul>
                    <p><strong>Example (Section Headers):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>###Instruction###
Summarize the following text in three bullet points.

###Text###
[Paste your long text here]

###Summary###
[AI generates summary here]</code></pre>
                    <p><strong>Example (XML-like Tags):</strong></p>
                    <pre><button class="copy-code-button">Copy</button><code>&lt;instruction&gt;
You are a helpful assistant. Your task is to answer the user's question based on the provided context. If the answer is not in the context, say you don't know.
&lt;/instruction&gt;

&lt;/context&gt;

&lt;question&gt;

&lt;/question&gt;</code></pre>

                    <h3>6. Negative Prompts / Constraints (Emphasized)</h3>
                    <p>Explicitly telling the AI what *not* to do, what topics to avoid, what constraints to adhere to, or what styles to shun can be just as important as telling it what to do. This provides finer control over the output.</p>
                    <p><strong>Benefits:</strong> Provides finer control over the output, helps avoid undesirable content or styles, and ensures the response stays within defined boundaries, preventing the AI from taking common but unwanted paths.</p>
                    <p><strong>Examples:</strong></p>
                    <ul>
                        <li><code>"Write a product description for our new software. Do not use marketing jargon or buzzwords. Avoid mentioning the price."</code></li>

                    <h2>A Practical Approach to Prompt Design</h2>
                    <p>Crafting truly effective prompts is an iterative skill that combines understanding the LLM's capabilities with clear communication. Here’s a practical guide:</p>

                    <h3>1. Start with a Clear Goal</h3>
                    <p>Before you write a single word of your prompt, ask yourself: <strong>What exactly do I want the AI to achieve?</strong> A well-defined objective is the foundation of a good prompt.</p>
                    <ul>
                        <li>Is it to generate text (email, report, code)?</li>
                        <li>Is it to summarize information?</li>
                        <li>Is it to answer a question?</li>
                        <li>Is it to brainstorm ideas?</li>
                        <li>Is it to translate language?</li>
                    </ul>
                    <p>The more specific your goal, the easier it will be to structure your prompt.</p>

                    <h3>2. Know Your Audience (for the AI's Output)</h3>
                    <p>Consider who will be reading or using the AI's generated response. This will influence the tone, style, complexity, and vocabulary you ask the AI to use.</p>
                    <ul>
                        <li><strong>Example for executives:</strong> <code>"Summarize this financial report for a non-technical executive audience, focusing on key takeaways and strategic implications. Keep it under 500 words."</code></li>
                        <li><strong>Example for technical peers:</strong> <code>"Explain the architecture of this microservice, detailing the communication protocols between components and potential scaling bottlenecks."</code></li>
                    </ul>

                    <h3>3. Break Down Complex Tasks</h3>
                    <p>If you have a large or complex request, don't try to cram it all into one massive prompt. LLMs perform better when tasks are broken down into smaller, more manageable steps. You can then chain these prompts together, using the output of one as input or context for the next.</p>
                    <p><strong>Example: Writing a research report</strong></p>
                    <ol>
                        <li>Prompt 1: "Generate an outline for a research report on [topic], including sections for Introduction, Literature Review, Methodology, Findings, Discussion, and Conclusion."</li>
                        <li>Prompt 2 (for each section): "Write the Introduction section for a research report on [topic], based on the following key points: [point A], [point B]."</li>
                        <li>Prompt 3: "Review the following draft of a research report for clarity, coherence, and grammatical errors. Suggest improvements. Draft: [text]"</li>
                    </ol>

                    <h3>4. Provide High-Quality Examples (for Few-Shot Prompting)</h3>
                    <p>When using few-shot prompting, the quality and relevance of your examples are paramount.</p>
                    <ul>
                        <li>Ensure your examples accurately reflect the desired output format, style, and content.</li>
                        <li>Use diverse examples if you want the AI to generalize well.</li>
                        <li>Make sure the examples are correct and well-written.</li>
                    </ul>

                    <h3>5. Be Explicit with Instructions</h3>
                    <p>Don't assume the AI knows what you mean. Spell out your requirements clearly.</p>

                    <h3>6. Test and Iterate: The Core Loop</h3>
                    <p>Prompt engineering is rarely a one-shot success. Expect to refine your prompts.</p>
                    <div class="note-box">

                        <ol>
                            <li><strong>Draft Prompt:</strong> Write your initial prompt based on your goal.</li>
                            <li><strong>Generate Output:</strong> Run the prompt with the LLM.</li>
                            <li><strong>Analyze Output:</strong>
                                <ul>
                                    <li>Is it accurate?</li>
                                    <li>Is it relevant to your goal?</li>
                                    <li>Is it complete?</li>
                                    <li>Is it in the correct format, tone, and style?</li>

                            <li><strong>Refine Prompt:</strong> Based on the analysis, modify your prompt. Consider:
                                <ul>

                                    <li>Changing or refining the persona.</li>
                                    <li>Adding or adjusting constraints.</li>

                    <h2>Mistakes to Watch Out For</h2>
                    <p>Even with good intentions, it's easy to fall into common traps when writing prompts. Being aware of these pitfalls can help you avoid them and get better results more consistently.</p>

                    <h3>1. Vague or Ambiguous Prompts</h3>
                    <p><strong>Pitfall:</strong> Using unclear language, undefined pronouns, or overly broad requests.</p>
                    <p><strong>Example:</strong> <code>"Write about it."</code> (What is "it"? What kind of writing?)</p>
                    <p><strong>Avoidance:</strong> Always strive for maximum clarity and specificity. Define your terms, explicitly state your subject, and detail your requirements.</p>

                    <h3>2. Lack of Sufficient Context</h3>
                    <p><strong>Pitfall:</strong> Assuming the AI knows background information that it hasn't been given.</p>
                    <p><strong>Example:</strong> <code>"Summarize our last meeting."</code> (The AI wasn't in your meeting!)</p>
                    <p><strong>Avoidance:</strong> Provide all necessary context directly in the prompt. This includes relevant background, previous discussions, specific data, or any constraints the AI needs to be aware of.</p>

                    <h3>3. Overly Complex Prompts (Too Many Tasks at Once)</h3>
                    <p><strong>Pitfall:</strong> Asking the AI to perform multiple, distinct, and complex tasks within a single prompt.</p>
                    <p><strong>Example:</strong> <code>"Write a blog post about AI, then create a social media campaign for it with 5 tweets and 3 LinkedIn posts, also draft a follow-up email to potential collaborators, and suggest a title for the webinar series we'll do on this."</code></p>
                    <p><strong>Avoidance:</strong> Break down complex requests into a series of smaller, more focused prompts. Address one primary goal per prompt for better quality and control.</p>

                    <h3>4. Not Specifying Desired Format, Length, or Tone</h3>
                    <p><strong>Pitfall:</strong> Leaving the output structure and style entirely up to the AI, which can lead to responses that are too long, too short, in the wrong format, or have an inappropriate tone.</p>
                    <p><strong>Example:</strong> <code>"Explain photosynthesis."</code> (Could be a single sentence or a 10-page essay.)</p>
                    <p><strong>Avoidance:</strong> Explicitly state your requirements: <code>"Explain photosynthesis in three paragraphs suitable for a middle school student, using a friendly and engaging tone."</code></p>

                    <h3>5. Ignoring the AI's Tendency to "Hallucinate"</h3>
                    <p><strong>Pitfall:</strong> Trusting every piece of information the LLM generates as factual, especially for topics where it might have limited or outdated training data.</p>
                    <p><strong>Avoidance:</strong> Always critically evaluate the AI's output, especially for factual claims, statistics, or critical information. Cross-verify with reliable sources. For critical tasks, ask the AI to cite sources if it has that capability, or provide it with trusted source material to work from (RAG concept).</p>

                    <h3>6. Bias in Prompts Leading to Biased Outputs</h3>
                    <p><strong>Pitfall:</strong> Phrasing prompts in a way that introduces or reinforces societal biases (gender, race, etc.), leading the AI to generate biased or stereotyped responses.</p>
                    <p><strong>Avoidance:</strong> Be mindful of your language. Strive for neutral phrasing. If you suspect bias in an output, try rephrasing the prompt, asking for multiple perspectives, or explicitly instructing the AI to avoid stereotypes.</p>

                    <h3>7. Leading Questions</h3>
                    <p><strong>Pitfall:</strong> Asking questions in a way that suggests a desired answer, which can prevent the AI from providing a more objective or comprehensive response.</p>
                    <p><strong>Example:</strong> <code>"Don't you think our new product is the best on the market and will revolutionize the industry?"</code></p>
                    <p><strong>Avoidance:</strong> If you want an unbiased assessment or diverse ideas, ask open-ended, neutral questions: <code>"Analyze the potential market impact of our new product compared to existing solutions."</code></p>

                    <h3>8. Assuming Prior Knowledge or Memory (in a conversation)</h3>
                    <p><strong>Pitfall:</strong> Expecting the LLM to perfectly remember all details from previous turns in a long conversation, especially for models with limited context windows.</p>
                    <p><strong>Avoidance:</strong> In longer interactions, or when starting a new but related query, briefly re-state key context or important information from earlier in the conversation to ensure the AI is on the right track.</p>

                    <h3>9. Not Iterating or Giving Up Too Soon</h3>
                    <p><strong>Pitfall:</strong> Getting a suboptimal response from the first prompt and assuming the AI isn't capable of the task.</p>
                    <p><strong>Avoidance:</strong> Embrace iterative refinement. Analyze the output, identify what's missing or wrong, and adjust your prompt. Often, a few tweaks can lead to dramatically better results.</p>

                    <h2>Key Prompt Engineering Terminology</h2>
                    <p>Understanding these common terms will help you navigate the world of prompt engineering and LLMs more effectively.</p>
                    <ul>
                        <li><strong>Prompt:</strong> The input text, question, or instruction given to a Large Language Model (LLM) to elicit a response.</li>
                        <li><strong>LLM (Large Language Model):</strong> An advanced artificial intelligence model trained on vast amounts of text data to understand, generate, and manipulate human language (e.g., GPT-3/4, Claude, Gemini, Llama).</li>
                        <li><strong>Zero-Shot Prompting:</strong> Asking an LLM to perform a task without providing any prior examples of how to do it.</li>
                        <li><strong>Few-Shot Prompting:</strong> Providing the LLM with a small number of examples (1-5 "shots") of the desired input-output behavior to guide its response for a new input.</li>
                        <li><strong>Chain-of-Thought (CoT) Prompting:</strong> A technique where the LLM is prompted to generate intermediate reasoning steps before arriving at a final answer, improving performance on complex tasks.</li>
                        <li><strong>Persona / Role Prompting:</strong> Instructing the LLM to adopt a specific character, role, or expertise (e.g., "Act as an expert historian...").</li>
                        <li><strong>Context Window:</strong> The amount of text (input prompt + generated output) that an LLM can consider at one time. Information outside this window might be "forgotten" by the model in a long conversation.</li>
                        <li><strong>Temperature:</strong> A parameter (often in LLM APIs or playgrounds, typically 0 to 1 or higher) that controls the randomness of the AI's output. Higher temperatures (e.g., 0.7-1.0) result in more creative or diverse responses, while lower temperatures (e.g., 0.1-0.3) produce more focused and deterministic outputs.</li>
                        <li><strong>Hallucination:</strong> When an LLM generates text that is plausible-sounding but factually incorrect, nonsensical, or not grounded in the provided context.</li>
                        <li><strong>Delimiter:</strong> Characters or strings (e.g., <code>###</code>, <code>"""</code>, <code>&lt;tag&gt;</code>) used to clearly separate different parts of a prompt (like instructions, context, and questions).</li>
                        <li><strong>Instruction Prompting:</strong> Directly telling the LLM what task to perform using clear action verbs and specific instructions.</li>
                        <li><strong>RAG (Retrieval Augmented Generation):</strong> An approach where an LLM's knowledge is augmented by retrieving relevant information from an external knowledge base (e.g., a set of documents, a database) before generating a response. This helps ground answers in specific, up-to-date, or proprietary information.</li>
                        <li><strong>Token:</strong> The basic unit of text that LLMs process. A token can be a word, part of a word, or punctuation. Prompt length and context windows are often measured in tokens.</li>
                        <li><strong>Fine-tuning:</strong> The process of further training a pre-trained LLM on a smaller, domain-specific dataset to adapt its knowledge and behavior for particular tasks or styles. (This is typically done by developers, not end-users via prompting).</li>
                    </ul>
                `

                        let textToCopy = preElement.innerText;
                        if (textToCopy.startsWith("Copy\n")) { // Check if "Copy" and newline is at start
                            textToCopy = textToCopy.substring(5); // Remove "Copy\n"
                        } else if (textToCopy.endsWith("\nCopy")) {
                             textToCopy = textToCopy.substring(0, textToCopy.length - 5);
                        } else if (textToCopy.includes("Copy")) {
                            // More robustly find and remove the button text if it's elsewhere
                            const buttonText = copyButton.innerText;
                            textToCopy = textToCopy.replace(buttonText, '').trim();
                        }

                        navigator.clipboard.writeText(textToCopy.trim()).then(() => {
                            showToast('Copied to clipboard!', 'success');
                        }).catch(err => {
                            console.error('Failed to copy: ', err);
                            showToast('Failed to copy.', 'error');
                        });
                    });
                }
            });
            updateNavButtons();
            contentArea.scrollTop = 0; 
        }
        
        function updateNavButtons() {
            if (currentSectionIndex === 0) {
                prevButton.classList.add('disabled');
                prevButton.onclick = null;
            } else {
                prevButton.classList.remove('disabled');
                prevButton.onclick = () => navigateSection(-1);
            }
            if (currentSectionIndex === primerData.length - 1) {
                nextButton.classList.add('disabled');
                nextButton.onclick = null;
            } else {
                nextButton.classList.remove('disabled');
                nextButton.onclick = () => navigateSection(1);
            }
        }

        function navigateSection(direction) {
            const newIndex = currentSectionIndex + direction;
            if (newIndex >= 0 && newIndex < primerData.length) {
                currentSectionIndex = newIndex;
                renderContent();
                renderSidebar();
            }
        }

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
        });
        
        document.addEventListener('click', function(event) {
            if (window.innerWidth < 768 && !sidebar.contains(event.target) && !menuToggle.contains(event.target) && !sidebar.classList.contains('collapsed')) {
                sidebar.classList.add('collapsed');
            }
        });

        renderSidebar();
        renderContent();

    </script>
</body>
</html>
